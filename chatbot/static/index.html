<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chatbot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .chat-body {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
        }
        
        .user-message {
            background-color: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .assistant-message {
            background-color: #f1f1f1;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 10px;
            font-size: 16px;
        }
        
        .chat-input button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .chat-input button:hover {
            background-color: #45a049;
        }
        
        .loading {
            text-align: center;
            padding: 10px;
            color: #666;
        }
        
        .clear-btn {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .clear-btn:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            Simple Chatbot
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant-message">
                你好！我是一个简单的聊天机器人，有什么可以帮助你的吗？
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-btn">发送</button>
        </div>
    </div>
    <script>
        // 会话ID，用于区分不同的对话
        let conversationId = 'default';
        
        // 加载历史消息
        async function loadHistory() {
            try {
                const response = await fetch(`/api/history?conversation_id=${conversationId}`);
                const history = await response.json();
                
                const chatBody = document.getElementById('chat-body');
                chatBody.innerHTML = '';
                
                if (history.length === 0) {
                    chatBody.innerHTML = '<div class="message assistant-message">你好！我是一个简单的聊天机器人，有什么可以帮助你的吗？</div>';
                } else {
                    history.forEach(msg => {
                        addMessage(msg.user, 'user');
                        addMessage(msg.assistant, 'assistant');
                    });
                }
            } catch (error) {
                console.error('加载历史消息失败:', error);
            }
        }
        
        // 添加消息到聊天界面
        function addMessage(text, sender) {
            const chatBody = document.getElementById('chat-body');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = text;
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }
        
        // 发送消息
        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, 'user');
            messageInput.value = '';
            
            // 显示加载状态
            const chatBody = document.getElementById('chat-body');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = '思考中...';
            loadingDiv.id = 'loading';
            chatBody.appendChild(loadingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId
                    })
                });
                
                const data = await response.json();
                
                // 移除加载状态
                document.getElementById('loading').remove();
                
                if (data.error) {
                    addMessage('错误: ' + data.error, 'assistant');
                } else {
                    addMessage(data.response, 'assistant');
                    conversationId = data.conversation_id;
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                document.getElementById('loading').remove();
                addMessage('发送消息失败，请重试', 'assistant');
            }
        }
        
        // 清除聊天历史
        async function clearHistory() {
            try {
                await fetch('/api/clear', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        conversation_id: conversationId
                    })
                });
                
                conversationId = 'default';
                loadHistory();
            } catch (error) {
                console.error('清除历史消息失败:', error);
            }
        }
        
        // 事件监听
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 加载历史消息
        loadHistory();
    </script>
</body>
</html>
