<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chatbot</title>
    <!-- 引入 Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: relative;
        }
        
        .settings-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .chat-body {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
        }
        
        .user-message {
            background-color: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .assistant-message {
            background-color: #f1f1f1;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            padding: 15px;
        }
        
        /* 思考区样式 */
        .thinking-section {
            background-color: #f9f9f9;
            border-left: 3px solid #ccc;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        
        .thinking-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .thinking-content {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* 回答区样式 */
        .answer-section {
            font-size: 16px;
            line-height: 1.6;
        }
        
        /* Markdown 样式 */
        .answer-section h1, .answer-section h2, .answer-section h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }
        
        .answer-section p {
            margin-bottom: 10px;
        }
        
        .answer-section ul, .answer-section ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }
        
        .answer-section code {
            background-color: #f4f4f4;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .answer-section pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 10px;
        }
        
        .answer-section pre code {
            background-color: transparent;
            padding: 0;
        }
        
        /* 截断提示 */
        .truncation-warning {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            font-style: italic;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 10px;
            font-size: 16px;
        }
        
        .chat-input button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .chat-input button:hover {
            background-color: #45a049;
        }
        
        .loading {
            text-align: center;
            padding: 10px;
            color: #666;
        }
        
        .clear-btn {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .clear-btn:hover {
            background-color: #d32f2f;
        }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
        }
        
        .settings-panel h3 {
            margin-bottom: 15px;
        }
        
        .setting-item {
            margin-bottom: 15px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 5px;
        }
        
        .setting-item input[type="range"] {
            width: 100%;
        }
        
        .setting-value {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
        }
        
        .settings-buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .settings-buttons button {
            margin-left: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .save-btn {
            background-color: #4CAF50;
            color: white;
        }
        
        .cancel-btn {
            background-color: #999;
            color: white;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            Simple Chatbot
            <button class="settings-btn" id="settings-btn">⚙️</button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant-message">
                你好！我是一个简单的聊天机器人，有什么可以帮助你的吗？
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-btn">发送</button>
        </div>
    </div>
    
    <!-- 设置面板 -->
    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settings-panel">
        <h3>设置</h3>
        <div class="setting-item">
            <label for="max-tokens">最大生成 token 数: <span class="setting-value" id="max-tokens-value">4096</span></label>
            <input type="range" id="max-tokens" min="512" max="8192" step="256" value="4096">
        </div>
        <div class="settings-buttons">
            <button class="cancel-btn" id="cancel-btn">取消</button>
            <button class="save-btn" id="save-btn">保存</button>
        </div>
    </div>
    <script>
        // 会话ID，用于区分不同的对话
        let conversationId = 'default';
        // 最大生成token数
        let maxNewTokens = 4096;
        
        // 解析响应，提取思考部分和回答部分
        function parseResponse(rawText) {
            const thinkRegex = /<think>([\s\S]*?)<\/think>/;
            const match = rawText.match(thinkRegex);
            
            const thinking = match ? match[1].trim() : null;
            // 移除思考部分，剩下的就是正式回答
            const answer = rawText.replace(thinkRegex, '').trim();
            
            return { thinking, answer };
        }
        
        // 检查回答是否可能被截断
        function isTruncated(answer) {
            // 检查回答末尾是否有标点符号
            const lastChar = answer.trim().slice(-1);
            const punctuation = ['.', '!', '?', '。', '！', '？'];
            return !punctuation.includes(lastChar);
        }
        
        // 添加消息到聊天界面
        function addMessage(text, sender) {
            const chatBody = document.getElementById('chat-body');
            
            if (sender === 'user') {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                messageDiv.textContent = text;
                chatBody.appendChild(messageDiv);
            } else if (sender === 'assistant') {
                // 解析助手消息
                const parsed = parseResponse(text);
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                
                // 添加思考部分
                if (parsed.thinking) {
                    const thinkingSection = document.createElement('div');
                    thinkingSection.className = 'thinking-section';
                    
                    const thinkingHeader = document.createElement('div');
                    thinkingHeader.className = 'thinking-header';
                    thinkingHeader.textContent = '思维链 (Reasoning Process)';
                    thinkingSection.appendChild(thinkingHeader);
                    
                    const thinkingContent = document.createElement('div');
                    thinkingContent.className = 'thinking-content';
                    thinkingContent.textContent = parsed.thinking;
                    thinkingSection.appendChild(thinkingContent);
                    
                    messageDiv.appendChild(thinkingSection);
                }
                
                // 添加回答部分
                const answerSection = document.createElement('div');
                answerSection.className = 'answer-section';
                // 使用 marked.js 渲染 Markdown
                answerSection.innerHTML = marked.parse(parsed.answer);
                messageDiv.appendChild(answerSection);
                
                // 添加截断提示
                if (isTruncated(parsed.answer)) {
                    const truncationWarning = document.createElement('div');
                    truncationWarning.className = 'truncation-warning';
                    truncationWarning.textContent = '生成已达到长度上限，内容可能不完整';
                    messageDiv.appendChild(truncationWarning);
                }
                
                chatBody.appendChild(messageDiv);
            }
            
            chatBody.scrollTop = chatBody.scrollHeight;
        }
        
        // 加载历史消息
        async function loadHistory() {
            try {
                const response = await fetch(`/api/history?conversation_id=${conversationId}`);
                const history = await response.json();
                
                const chatBody = document.getElementById('chat-body');
                chatBody.innerHTML = '';
                
                if (history.length === 0) {
                    chatBody.innerHTML = '<div class="message assistant-message">你好！我是一个简单的聊天机器人，有什么可以帮助你的吗？</div>';
                } else {
                    history.forEach(msg => {
                        addMessage(msg.user, 'user');
                        addMessage(msg.assistant, 'assistant');
                    });
                }
            } catch (error) {
                console.error('加载历史消息失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, 'user');
            messageInput.value = '';
            
            // 显示加载状态
            const chatBody = document.getElementById('chat-body');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = '思考中...';
            loadingDiv.id = 'loading';
            chatBody.appendChild(loadingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId,
                        max_new_tokens: maxNewTokens
                    })
                });
                
                const data = await response.json();
                
                // 移除加载状态
                document.getElementById('loading').remove();
                
                if (data.error) {
                    addMessage('错误: ' + data.error, 'assistant');
                } else {
                    addMessage(data.response, 'assistant');
                    conversationId = data.conversation_id;
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                document.getElementById('loading').remove();
                addMessage('发送消息失败，请重试', 'assistant');
            }
        }
        
        // 清除聊天历史
        async function clearHistory() {
            try {
                await fetch('/api/clear', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        conversation_id: conversationId
                    })
                });
                
                conversationId = 'default';
                loadHistory();
            } catch (error) {
                console.error('清除历史消息失败:', error);
            }
        }
        
        // 设置面板相关功能
        function initSettings() {
            const settingsBtn = document.getElementById('settings-btn');
            const settingsPanel = document.getElementById('settings-panel');
            const overlay = document.getElementById('overlay');
            const cancelBtn = document.getElementById('cancel-btn');
            const saveBtn = document.getElementById('save-btn');
            const maxTokensSlider = document.getElementById('max-tokens');
            const maxTokensValue = document.getElementById('max-tokens-value');
            
            // 显示设置面板
            settingsBtn.addEventListener('click', () => {
                settingsPanel.style.display = 'block';
                overlay.style.display = 'block';
                // 设置当前值
                maxTokensSlider.value = maxNewTokens;
                maxTokensValue.textContent = maxNewTokens;
            });
            
            // 隐藏设置面板
            function hideSettings() {
                settingsPanel.style.display = 'none';
                overlay.style.display = 'none';
            }
            
            cancelBtn.addEventListener('click', hideSettings);
            overlay.addEventListener('click', hideSettings);
            
            // 更新显示值
            maxTokensSlider.addEventListener('input', () => {
                maxTokensValue.textContent = maxTokensSlider.value;
            });
            
            // 保存设置
            saveBtn.addEventListener('click', () => {
                maxNewTokens = parseInt(maxTokensSlider.value);
                hideSettings();
            });
        }
        
        // 事件监听
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 初始化设置面板
        initSettings();
        
        // 加载历史消息
        loadHistory();
    </script>
</body>
</html>
